<!DOCTYPE html>
<html lang="vi">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vui học tiếng Trung</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f0f0;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --hover-color: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: #404040;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --hover-color: #3d3d3d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 5px;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            position: relative;
        }
        .header h1 {
            color: #ff0000;
            margin: 0;
            text-align: center;
            font-size: 30px;
        }

        .header-buttons {
            position: absolute;
            right: 0;
            display: flex;
            gap: 10px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .lesson-selector {
            padding: 8px;
            font-size: 16px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .zoom-controls {
            display: none;
            gap: 10px;
            align-items: center;
        }

        .btn-custom {
            padding: 8px 12px;
            cursor: pointer;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .btn-custom:hover {
            background-color: var(--border-color);
        }

        .pdf-container {
            background: var(--bg-secondary);
            padding: 5px;
            min-height: calc(100vh - 150px);
            border-radius: 8px;
        }

        .pdf-page {
            margin: 10px auto;
            box-shadow: 0 2px 5px var(--shadow-color);
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            scroll-margin-top: 20px; /* Thêm margin khi scroll tới */
        }

        .pdf-page canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: var(--text-secondary);
        }

        #progressBar {
            width: 100%;
            height: 4px;
            background: var(--bg-secondary);
            margin-top: 10px;
            border-radius: 2px;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* --- NÚT BOOKMARK CỐ ĐỊNH TRÊN CÙNG BÊN TRÁI --- */
        .fixed-bookmark-btn {
            position: fixed;
            top: 20px;
            left: 0; /* Bám sát cạnh trái */
            z-index: 990;
            padding: 2px 2px 2px 2px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-left: none; /* Bỏ viền bên trái */
            border-radius: 0 8px 8px 0; /* Chỉ bo tròn cạnh phải */
            cursor: pointer;
            box-shadow: 2px 4px 8px var(--shadow-color); /* Đổ bóng sang phải */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px; /* Tăng kích thước icon cho dễ bấm */
            transition: all 0.3s ease;
        }

        .fixed-bookmark-btn:hover {
            background-color: var(--hover-color);
            padding-left: 15px; /* Hiệu ứng thò ra một chút khi hover */
            box-shadow: 4px 4px 12px var(--shadow-color);
        }

        /* --- CSS CHO BOOKMARK PANEL --- */
        .bookmark-panel {
            position: fixed;
            top: 0;
            left: -300px; /* Ẩn mặc định */
            width: 280px;
            height: 100vh;
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            box-shadow: 2px 0 10px var(--shadow-color);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .bookmark-panel.open {
            left: 0;
        }

        .bookmark-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
        }

        .bookmark-header h3 {
            margin: 0;
            font-size: 18px;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff0000;
        }

        .bookmark-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .bookmark-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 0;
            border-bottom: none;
        }

        .bookmark-content {
            padding: 8px 0px; /* Thu nhỏ lề trái/phải từ 20px xuống 10px */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .bookmark-content:hover {
            background-color: var(--hover-color);
        }

        .bookmark-title-wrap {
            display: flex;
            align-items: center;
            gap: 2px; /* Giảm khoảng cách giữa mũi tên và text */
            flex: 1;
        }

        .bookmark-toggle {
            cursor: pointer;
            width: 16px; /* Giảm độ rộng của khu vực mũi tên */
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px; /* Nhỏ gọn hơn */
            transition: transform 0.2s;
            color: var(--text-secondary);
            user-select: none;
        }

        .bookmark-toggle.open {
            transform: rotate(90deg);
        }

        .bookmark-toggle.hidden {
            visibility: hidden;
        }

        .bookmark-children {
            list-style: none;
            padding-left: 15px; /* Giảm độ thụt lề của các mục con */
            margin: 0;
            display: none;
        }

        .bookmark-children.open {
            display: block;
        }

        .bookmark-title {
            font-size: 14px;
            color: var(--text-primary);
            flex: 1;
            padding-right: 10px;
        }

        .bookmark-page {
            font-size: 12px;
            color: var(--text-secondary);
            background-color: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
        }
        
        .bookmark-empty {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Nút mở Bookmark cố định -->
    <button id="toggleBookmarks" class="fixed-bookmark-btn" title="Mở mục lục">
        📑
    </button>

    <!-- Thanh Bookmark -->
    <div id="bookmarkPanel" class="bookmark-panel">
        <div class="bookmark-header">
            <h3>📑 Mục lục</h3>
            <button id="closeBookmarks" class="close-btn">&times;</button>
        </div>
        <ul id="bookmarkList" class="bookmark-list">
            <!-- Dữ liệu bookmark sẽ được load vào đây -->
        </ul>
    </div>

    <div class="container">
        <div class="header">
            <h1>Vui học tiếng Trung</h1>
            <div class="header-buttons">
                <button class="btn-custom" id="themeToggle">
                    <span class="theme-icon">🌓</span>
                </button>
            </div>
        </div>

        <div class="controls">
            <select class="lesson-selector" id="lessonSelect">
                <option value="1">H1 Bài 1 老师您好！</option>
                <option value="2">H1 Bài 2 谢谢你！</option>
                <option value="3">H1 Bài 3 你叫什么名字？</option>
                <option value="4">H1 Bài 4 她是我的汉语老师。</option>
                <option value="5">H1 Bài 5 她女儿今年八岁。 </option>
                <option value="6">H1 Bài 6 我会说汉语。 </option>
                <option value="7">H1 Bài 7 今天几号？ </option>
                <option value="8">H1 Bài 8 我想喝茶。 </option>
                <option value="9">H1 Bài 9 你儿子在哪儿工作？</option>
                <option value="10">H1 Bài 10 我能做这吗？</option>
                <option value="11">H1 Bài 11 现在几点？</option>
                <option value="12">H1 Bài 12 明天天气怎么样？</option>
                <option value="13">H1 Bài 13 我在学做中国菜。</option>
                <option value="14">H1 Bài 14 他买了不少衣服。</option>
                <option value="15">H1 Bài 15 我是坐飞机来的</option>
            </select>
            <div class="zoom-controls">
                <button class="btn-custom" id="zoomOut">-</button>
                <span id="zoomLevel">200%</span>
                <button class="btn-custom" id="zoomIn">+</button>
            </div>
        </div>

        <div id="progressBar" style="display: none;">
            <div id="progressFill"></div>
        </div>

        <div id="pdfViewer" class="pdf-container"></div>
    </div>

    <script>
        let currentPDF = null;
        let currentScale = 2.0;
        const ZOOM_STEP = 0.1;

        // Theme handling
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // --- CHỨC NĂNG BOOKMARK ---
        const bookmarkPanel = document.getElementById('bookmarkPanel');
        const toggleBtn = document.getElementById('toggleBookmarks');
        const closeBtn = document.getElementById('closeBookmarks');

        // Mở/đóng panel bookmark
        function toggleBookmarkPanel(show) {
            if (show === undefined) {
                bookmarkPanel.classList.toggle('open');
            } else if (show) {
                bookmarkPanel.classList.add('open');
            } else {
                bookmarkPanel.classList.remove('open');
            }
        }

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Ngăn sự kiện click truyền ra ngoài body
            toggleBookmarkPanel();
        });

        closeBtn.addEventListener('click', () => toggleBookmarkPanel(false));

        // Tự động ẩn khi click ra ngoài panel
        document.addEventListener('click', (e) => {
            if (bookmarkPanel.classList.contains('open') && 
                !bookmarkPanel.contains(e.target) && 
                e.target !== toggleBtn) {
                toggleBookmarkPanel(false);
            }
        });

        // Tải dữ liệu Bookmark từ file txt
        async function loadBookmarks(lessonNumber) {
            const list = document.getElementById('bookmarkList');
            list.innerHTML = ''; // Xóa dữ liệu cũ
            
            try {
                // Đường dẫn tới file txt (ví dụ: data_study/bai1_bm.txt)
                const response = await fetch(`data_study/bai${lessonNumber}_bm.txt`);
                
                if (!response.ok) throw new Error('Không tìm thấy file bookmark');
                
                const text = await response.text();
                const lines = text.split('\n');
                
                // Khởi tạo gốc của cây (root)
                const root = { children: [] };
                // Sử dụng stack để theo dõi cấp độ cha con
                const stack = [ { level: -1, node: root } ];
                let hasBookmarks = false;

                lines.forEach(line => {
                    if (!line.trim()) return;
                    
                    // Regex lấy: [1] khoảng trắng đầu dòng, [2] Tên, [3] Trang
                    const match = line.match(/^(\s*)(.*?)\s*\[(\d+)\]\s*$/);
                    
                    if (match) {
                        hasBookmarks = true;
                        // Tính cấp độ (level) dựa trên độ dài khoảng trắng (quy đổi 1 tab = 4 space)
                        const indent = match[1].replace(/\t/g, '    ').length;
                        const title = match[2];
                        const page = parseInt(match[3], 10);
                        const item = { title, page, children: [] };

                        // Tìm node cha phù hợp dựa trên độ lùi đầu dòng (indent)
                        while (stack.length > 1 && stack[stack.length - 1].level >= indent) {
                            stack.pop();
                        }
                        
                        // Thêm vào danh sách con của node cha tìm được
                        stack[stack.length - 1].node.children.push(item);
                        // Đưa node hiện tại vào stack để làm cha cho các node thụt lề sâu hơn tiếp theo
                        stack.push({ level: indent, node: item });
                    }
                });

                if (!hasBookmarks) throw new Error('File rỗng hoặc sai định dạng');

                // Hàm đệ quy để render HTML cho cây Mục lục
                function renderTree(nodes, parentElement) {
                    nodes.forEach(node => {
                        const li = document.createElement('li');
                        li.className = 'bookmark-item';
                        
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'bookmark-content';
                        
                        const titleWrap = document.createElement('div');
                        titleWrap.className = 'bookmark-title-wrap';

                        const hasChild = node.children.length > 0;
                        
                        // Nút mũi tên (ẩn đi nếu không có mục con)
                        const toggleBtn = document.createElement('span');
                        toggleBtn.className = `bookmark-toggle ${hasChild ? 'open' : 'hidden'}`;
                        toggleBtn.innerHTML = '▶';
                        
                        const titleSpan = document.createElement('span');
                        titleSpan.className = 'bookmark-title';
                        titleSpan.textContent = node.title;

                        titleWrap.appendChild(toggleBtn);
                        titleWrap.appendChild(titleSpan);

                        const pageSpan = document.createElement('span');
                        pageSpan.className = 'bookmark-page';
                        pageSpan.textContent = `Tr ${node.page}`;

                        contentDiv.appendChild(titleWrap);
                        contentDiv.appendChild(pageSpan);
                        li.appendChild(contentDiv);

                        let childrenContainer = null;
                        if (hasChild) {
                            childrenContainer = document.createElement('ul');
                            childrenContainer.className = 'bookmark-children open'; // Mặc định mở
                            renderTree(node.children, childrenContainer);
                            li.appendChild(childrenContainer);

                            // Bấm vào mũi tên để đóng/mở mục con
                            toggleBtn.onclick = (e) => {
                                e.stopPropagation();
                                childrenContainer.classList.toggle('open');
                                toggleBtn.classList.toggle('open');
                            };
                        }

                        // Bấm vào tên mục lục để chuyển trang
                        contentDiv.onclick = (e) => {
                            // Nếu bấm vào nút mũi tên (toggle) thì bỏ qua không chuyển trang
                            if(e.target === toggleBtn) return; 
                            scrollToPage(node.page);
                            toggleBookmarkPanel(false);
                        };

                        parentElement.appendChild(li);
                    });
                }

                renderTree(root.children, list);

            } catch (error) {
                console.log('Lỗi tải Bookmark:', error);
                list.innerHTML = `<li class="bookmark-empty">Chưa có dữ liệu mục lục cho bài này.</li>`;
            }
        }

        // Cuộn tới trang được chọn
        function scrollToPage(pageNum) {
            const pageElement = document.getElementById(`pdf-page-${pageNum}`);
            if (pageElement) {
                // Đổi behavior từ 'smooth' thành 'auto' để nhảy trang ngay lập tức
                pageElement.scrollIntoView({ behavior: 'auto', block: 'start' });
            } else {
                alert(`Trang ${pageNum} đang được tải hoặc không tồn tại.`);
            }
        }
        // --------------------------

        async function loadPDF(lessonNumber) {
            // Tải Bookmark cùng lúc với PDF
            loadBookmarks(lessonNumber);

            const url = `data_study/Bài ${lessonNumber}.pdf`;
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const container = document.getElementById('pdfViewer');

            progressBar.style.display = 'block';
            container.innerHTML = '<div class="loading">Đang tải...</div>';

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                
                loadingTask.onProgress = function(progress) {
                    const percent = (progress.loaded / progress.total * 100) || 0;
                    progressFill.style.width = `${percent}%`;
                };

                const pdf = await loadingTask.promise;
                currentPDF = pdf;
                container.innerHTML = '';

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const pageContainer = document.createElement('div');
                    pageContainer.className = 'pdf-page';
                    // Gắn ID cho page để bookmark có thể cuộn tới
                    pageContainer.id = `pdf-page-${pageNum}`;
                    container.appendChild(pageContainer);

                    const page = await pdf.getPage(pageNum);
                    const canvas = document.createElement('canvas');
                    pageContainer.appendChild(canvas);

                    const viewport = page.getViewport({ scale: currentScale });
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;
                }
            } catch (error) {
                console.error('Error loading PDF:', error);
                container.innerHTML = '<div class="loading">Lỗi khi tải PDF. Vui lòng kiểm tra lại đường dẫn file.</div>';
            } finally {
                progressBar.style.display = 'none';
            }
        }

        function updateZoomLevel() {
            document.getElementById('zoomLevel').textContent = `${Math.round(currentScale * 100)}%`;
        }

        document.getElementById('zoomIn').addEventListener('click', () => {
            currentScale += ZOOM_STEP;
            updateZoomLevel();
            const currentLesson = document.getElementById('lessonSelect').value;
            loadPDF(currentLesson);
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            if (currentScale > ZOOM_STEP) {
                currentScale -= ZOOM_STEP;
                updateZoomLevel();
                const currentLesson = document.getElementById('lessonSelect').value;
                loadPDF(currentLesson);
            }
        });

        document.getElementById('lessonSelect').addEventListener('change', (e) => {
            loadPDF(e.target.value);
        });

        // Load initial PDF
        loadPDF(1);
    </script>
</body>
</html>
