        @media print {

            #app, #toast-container, #avatar-modal-container, #mobile-overlay, #sidebar-desktop {

            html, body {
                width: 100%;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                color: black !important;
                overflow: visible !important;
            }
            
            /* 3. Container in ấn: Dùng STATIC để tuân thủ luồng văn bản tự nhiên */
            #print-content {
                display: block !important;
                position: static !important; /* QUAN TRỌNG: Không dùng absolute */
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                visibility: visible !important;
                overflow: visible !important;
            }
            
            /* Đảm bảo nội dung bên trong hiện ra */
            #print-content * {
                visibility: visible !important;
            }

            /* 4. Class bao quanh mỗi học sinh: Bắt buộc ngắt trang sau nó */
            .print-page-break {
                display: block !important;
                width: 100% !important;
                min-height: 100vh; /* Chiếm tối thiểu 1 trang */
                box-sizing: border-box !important;
                padding: 40px 50px !important; /* Canh lề giấy */
                position: relative !important;
                
                /* Lệnh ngắt trang */
                page-break-after: always !important; 
                break-after: page !important;
            }

            /* 5. Ngăn không cho cắt đôi các khối quan trọng (Bảng, Nhận xét) */
            .no-break-box, table, tr, td, th {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            
            /* Reset màu sắc để in đậm nét */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
            
            .print-header {
                 text-align: center;
                 margin-bottom: 20px;
                 padding-bottom: 10px;
                 /* Đã xóa border-bottom ở đây */
            }
            .print-question {
                page-break-inside: avoid;
                margin-bottom: 15px;
                padding-bottom: 5px;
                border: none !important; /* QUAN TRỌNG: Xóa dòng kẻ ngang giữa các câu */
            }
            .print-question-text {
                font-size: 13pt;
                font-weight: bold;
                margin-bottom: 8px;
                line-height: 1.4;
            }

            }
        }
/* --- CSS CHO VÒNG QUAY MAY MẮN (ĐÃ FIX LỖI MÉO HÌNH) --- */
        .wheel-container {
            position: relative;
            
            /* Thay đổi ở đây: */
            width: 100%;             /* Chiếm tối đa chiều rộng cho phép */
            max-width: 250px;        /* Giới hạn kích thước tối đa là 300px */
            aspect-ratio: 1 / 1;     /* QUAN TRỌNG: Buộc chiều cao luôn bằng chiều rộng -> Luôn là hình vuông/tròn */
            
            margin: 0 auto;          /* Căn giữa */
        }

        /* Các phần dưới giữ nguyên, chỉ đảm bảo .wheel thừa kế đúng kích thước */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 8px solid white;
            box-sizing: border-box; /* Đảm bảo viền không làm méo hình */
        }
        .wheel-segment {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 70%); /* Cắt hình rẻ quạt (ước lượng cho 5 ô) */
            /* Chính xác cho 5 ô (72 độ mỗi ô): dùng conic-gradient ở dưới sẽ tốt hơn cho màu nền */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        /* Vẽ màu nền bằng Conic Gradient cho chính xác 5 phần */
        .wheel-bg {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #FF6B6B 0deg 72deg,    /* 10 Điểm - Đỏ nhạt */
                #4ECDC4 72deg 144deg,  /* 20 Điểm - Xanh ngọc */
                #FFE66D 144deg 216deg, /* 100 Điểm - Vàng */
                #95A5A6 216deg 288deg, /* Mất lượt - Xám */
                #A855F7 288deg 360deg  /* Thêm vé - Tím */
            );
        }
        /* Nhãn chữ nằm trên các ô */
        .wheel-label {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: 50% 50%;
            width: 0; height: 0;
        }
        .wheel-text {
            position: absolute;
            left: -50px; bottom: 60px; /* Căn chỉnh vị trí chữ ra xa tâm */
            width: 100px;
            text-align: center;
            transform-origin: 50% 100%; /* Xoay quanh tâm */
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-size: 13px;
        }
        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px; 
            height: 40px;
            background: #FF3B30;
            clip-path: polygon(100% 0, 50% 100%, 0 0); /* Hình tam giác */
            z-index: 20;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: white;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };

        // Chuyển đổi thành Blob URL và chèn vào thẻ <head>
        const stringManifest = JSON.stringify(manifestData);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        // --- 4. LOGIC TẠO CÂU HỎI ĐẤU TRƯỜNG MỚI (Giữ nguyên) ---
        const generateArenaQuestions = () => {
            const vocabList = state.data.vocabulary;
            const questions = [];
            if (vocabList.length < 4) return [];

            const NUM_QUESTION_TYPES = 7; 

            for(let i = 0; i < 10; i++) {
                const correctItem = vocabList[Math.floor(Math.random() * vocabList.length)];
                const type = Math.floor(Math.random() * NUM_QUESTION_TYPES) + 1; 
                let qText = "", qOptions = [], correctAnswerVal = "", audioWord = null, audioSentence = null;
                let qTypeId = type; 

                const distractors = [];
                while(distractors.length < 3) {
                    const item = vocabList[Math.floor(Math.random() * vocabList.length)];
                    if (item.word !== correctItem.word && !distractors.includes(item)) distractors.push(item);
                }
                
                const sentence = `我喜欢${correctItem.word}。`;
                
                switch(type) {
                    case 1: 
                        qText = `Nghĩa của từ <span class="text-blue-600 font-bold text-3xl mx-2">${correctItem.word}</span> là gì?`;
                        correctAnswerVal = correctItem.meaning;
                        qOptions = [correctItem.meaning, ...distractors.map(d => d.meaning)];
                        break;
                    case 2: 
                        qText = `Pinyin của từ <span class="text-blue-600 font-bold text-3xl mx-2">${correctItem.word}</span> là gì?`;
                        correctAnswerVal = correctItem.pinyin;
                        qOptions = [correctItem.pinyin, ...distractors.map(d => d.pinyin)];
                        break;
                    case 3: 
                        qText = `Từ nào có nghĩa là <span class="text-green-600 font-bold text-2xl mx-2">"${correctItem.meaning}"</span>?`;
                        correctAnswerVal = correctItem.word;
                        qOptions = [correctItem.word, ...distractors.map(d => d.word)];
                        break;
                    case 4: 
                        qText = `Nghe và chọn từ vựng đúng:`;
                        audioWord = correctItem.word;
                        correctAnswerVal = correctItem.word;
                        qOptions = [correctItem.word, ...distractors.map(d => d.word)];
                        break;
                    case 5: 
                        qText = `Nghe và chọn nghĩa đúng:`;
                        audioWord = correctItem.word;
                        correctAnswerVal = correctItem.meaning;
                        qOptions = [correctItem.meaning, ...distractors.map(d => d.meaning)];
                        break;
                    case 6: 
                        qTypeId = 6;
                        qText = `Nghe câu và chọn nghĩa đúng:`;
                        audioSentence = sentence;
                        correctAnswerVal = `Tôi thích ${correctItem.meaning}.`; 
                        const sentenceMeanings = [`Tôi thích ${correctItem.meaning}.`];
                        while(sentenceMeanings.length < 4) {
                             const distractorItem = vocabList[Math.floor(Math.random() * vocabList.length)];
                             const distractorMeaning = `Tôi thích ${distractorItem.meaning}.`;
                             if (!sentenceMeanings.includes(distractorMeaning)) {
                                 sentenceMeanings.push(distractorMeaning);
                             }
                        }
                        qOptions = sentenceMeanings;
                        break;
                    case 7: 
                        qTypeId = 7;
                        qText = `Nghe và viết lại câu tiếng Trung:`;
                        audioSentence = sentence;
                        correctAnswerVal = sentence;
                        qOptions = []; 
                        break;
                }
                
                const shuffledOptions = qOptions.sort(() => Math.random() - 0.5);
                
                if (qTypeId === 7) {
                    questions.push({
                        type: 'arena_input', 
                        qTypeId: type,
                        text: qText,
                        audioSentence: audioSentence,
                        correct: correctAnswerVal 
                    });
                } else {
                    questions.push({
                        type: 'arena_quiz',
                        qTypeId: type,
                        text: qText,
                        options: shuffledOptions,
                        correct: shuffledOptions.indexOf(correctAnswerVal),
                        audioWord: audioWord,
                        audioSentence: audioSentence 
                    });
                }
            }
            return questions;

        const getImportInstructions = (type) => {

                 'reading_comprehension': {

                     structure: '#\nĐoạn văn bản cần đọc...\n[H] Câu hỏi cho đoạn văn?\n[TL] Đáp án A|Đáp án B*|Đáp án C|Đáp án D' 
                 }

             return instructionsMap[type] || { instructions: 'Vui lòng chọn loại câu hỏi phù hợp.', structure: 'Không rõ' };

        const renderImportDataModal = () => {

        // --- Giao diện dùng chung cho tạo/sửa assignment và bank (Cập nhật Responsive) ---

                    <select id="q-type-select" onchange="changeQuestionType(this.value)" class="w-full p-2 border border-blue-300 rounded-lg">
                        <option value="mcq" ${state.ui.newQuestionType === 'mcq' ? 'selected' : ''}>1. Trắc nghiệm</option>
                        <option value="fib" ${state.ui.newQuestionType === 'fib' ? 'selected' : ''}>2. Điền từ còn thiếu</option>
                        <option value="jumble" ${state.ui.newQuestionType === 'jumble' ? 'selected' : ''}>3. Xếp từ thành câu</option>
                        <option value="match" ${state.ui.newQuestionType === 'match' ? 'selected' : ''}>4. Ghép đôi</option>
                        <option value="translation" ${state.ui.newQuestionType === 'translation' ? 'selected' : ''}>5. Dịch câu (Việt - Trung)</option>
                        <option value="listen_mcq" ${state.ui.newQuestionType === 'listen_mcq' ? 'selected' : ''}>6. Nghe âm thanh chọn nghĩa</option>
                        <option value="listen_write" ${state.ui.newQuestionType === 'listen_write' ? 'selected' : ''}>7. Nghe câu viết lại</option>
                        <option value="listen_translate" ${state.ui.newQuestionType === 'listen_translate' ? 'selected' : ''}>8. Nghe câu dịch nghĩa</option>

                       <option value="order_sentences" ${state.ui.newQuestionType === 'order_sentences' ? 'selected' : ''}>10. Sắp xếp câu thành đoạn văn</option>

                   <option value="make_sentence" ${state.ui.newQuestionType === 'make_sentence' ? 'selected' : ''}>12. Đặt câu với từ cho trước (Tự luận)</option>
    <option value="image_describe" ${state.ui.newQuestionType === 'image_describe' ? 'selected' : ''}>13. Nhìn hình đặt câu (Tự luận)</option>
 </select>

        const getQuestionTypeLabel = (type) => {
            const labels = {
                mcq: 'Trắc nghiệm', fib: 'Điền từ', jumble: 'Xếp từ', 
                match: 'Ghép đôi', translation: 'Dịch câu',
                listen_mcq: 'Nghe - Chọn nghĩa', listen_write: 'Nghe - Viết lại',
                listen_translate: 'Nghe - Dịch nghĩa',
                listen_conversation: 'Nghe hội thoại & Trả lời',
                order_sentences: 'Sắp xếp câu',
                reading_comprehension: 'Đọc hiểu văn bản'
            };
            return labels[type] || 'Không xác định';
        };

const renderQuestionDisplay = (q, qIdx) => {
            const typeLabel = getQuestionTypeLabel(q.type);
            
            let content = '';
            let mainText = q.vietnamese || q.text || '';
            let audioInfo = '';
            
            if (q.audioText) {
                audioInfo = `<p class="text-purple-600 font-bold mb-2 flex items-center gap-1"><i data-lucide="volume-2" size="18"></i> Âm thanh: ${q.audioText}</p>`;
            } else if (q.audioUrl) {
                 audioInfo = `<p class="text-purple-600 font-bold mb-2 flex items-center gap-1"><i data-lucide="volume-2" size="18"></i> Có file âm thanh</p>`;
            }

            switch(q.type) {
                case 'mcq':
                    const correctOption = q.options[q.correct];
                    content = `Đáp án đúng: <span class="font-bold text-green-700">(${correctOption})</span>`;
                    content += `<div class="mt-2 space-y-1 text-xs">` + q.options.map((opt, i) => 
                        `<p class="${i === q.correct ? 'text-green-600 font-bold' : 'text-slate-500'}">${String.fromCharCode(65+i)}. ${opt}</p>`
                    ).join('') + `</div>`;
                    break;

                case 'listen_mcq':
                case 'listen_conversation': 
                    if (q.type === 'listen_conversation') {
                         mainText = `[Hội thoại] ${q.text}`;
                         if (q.conversationContent) {
                             content += `<div class="mb-2 p-2 bg-slate-50 rounded text-xs text-slate-500 italic border border-slate-200 whitespace-pre-line">${q.conversationContent}</div>`;
                         }
                    }
                    const correctListenOption = q.options[q.correct];
                    content += `Đáp án đúng: <span class="font-bold text-green-700">(${correctListenOption})</span>`;
                    content += `<div class="mt-2 space-y-1 text-xs">` + q.options.map((opt, i) => 
                        `<p class="${i === q.correct ? 'text-green-600 font-bold' : 'text-slate-500'}">${String.fromCharCode(65+i)}. ${opt}</p>`
                    ).join('') + `</div>`;
                    break;

                case 'reading_comprehension':
                    mainText = `[Câu hỏi] ${q.text}`;
                    if (q.conversationContent) {
                         content += `
                            <div class="mb-3 p-3 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 whitespace-pre-line shadow-sm leading-relaxed font-serif">
                                ${formatText(q.conversationContent)}
                            </div>
                         `;
                    }
                    const correctReadingOption = q.options[q.correct];
                    content += `Đáp án đúng: <span class="font-bold text-green-700">(${correctReadingOption})</span>`;
                    content += `<div class="mt-2 space-y-1 text-xs">` + q.options.map((opt, i) => 
                        `<p class="${i === q.correct ? 'text-green-600 font-bold' : 'text-slate-500'}">${String.fromCharCode(65+i)}. ${opt}</p>`
                    ).join('') + `</div>`;
                    break;

                case 'fib':
                    content = `Câu: ${q.text.replace('[BLANK]', '<span class="text-blue-600 font-bold">______</span>')}<br>Đáp án: **${q.answer}**`;
                    break;
                case 'jumble':
                    content = `Câu đúng: **${q.answer.join(' ')}**`;
                    break;
                case 'order_sentences':
                    const sentences = Array.isArray(q.answer) ? q.answer : [];
                    content = `<p class="text-xs font-bold text-slate-500 mb-1">Thứ tự đúng:</p>`;
                    content += `<div class="space-y-1">` + 
                        sentences.map((s, i) => `
                            <div class="p-2 bg-green-50 border border-green-200 rounded flex gap-2 text-sm">
                                <span class="font-bold text-green-700">${i+1}.</span> 
                                <span class="text-slate-800">${s}</span>
                            </div>
                        `).join('') + 
                        `</div>`;
                    break;
                case 'match':
                    content = 'Các cặp ghép nối:<br>' + q.pairs.map(p => `**${p.a}** -> **${p.b}**`).join('<br>');
                    break;
                case 'translation':
                    content = `Câu TV: ${q.vietnamese}<br>Đáp án TC: **${q.chinese}**`;
                    break;
                case 'listen_write':
                    mainText = `Yêu cầu: ${q.text || 'Viết lại câu đã nghe'}`;
                    content = `Đáp án: **${q.answer}**`;
                    break;
                case 'listen_translate':
                    mainText = `Yêu cầu: ${q.text || 'Dịch câu đã nghe sang tiếng Việt'}`;
                    content = `Đáp án (TV): **${q.answer}**`;
                    break;
            }

            // [ĐÃ SỬA] Thêm điều kiện check challengeMode
            const isEditable = state.ui.viewAssignmentId 
                            || state.ui.bankMode === 'view' 
                            || state.ui.bankMode === 'create' 
                            || state.ui.isCreatingAssignment
                            || state.ui.challengeMode === 'create' 
                            || state.ui.challengeMode === 'edit';

            return `
                <div id="q-card-${qIdx}"
	onclick="window.focusQuestion(${qIdx})" 
                     class="p-3 md:p-4 border rounded-xl bg-white mb-2 flex justify-between items-start transition-all cursor-pointer relative
                     ${state.ui.focusedIndex === qIdx 
                        ? 'border-blue-500 ring-2 ring-blue-200 shadow-lg z-10 transform scale-[1.01]' 
                        : 'border-slate-200 hover:border-blue-300 hover:shadow-md'
                     }">
                     
                     ${state.ui.focusedIndex === qIdx ? 
                        `` : ''
                     }
                    <div class="flex-1">

                        ${audioInfo}
                        <p class="font-medium mb-1 text-sm md:text-base">${mainText}</p>
                        <div class="text-xs md:text-sm text-slate-700 mt-2">
                            ${content}
                        </div>

${isEditable ? `

                            <button onclick="openEditQuestion(${qIdx}, '${state.view === 'challenges' ? 'challenge' : 'assignment'}')" 
                                class="text-blue-500 hover:text-blue-700 p-2 rounded-full bg-blue-50 hover:bg-blue-100 transition shadow-sm" 
                                title="Sửa nội dung">
                                <i data-lucide="pencil" size="18"></i>
                            </button>
                            
                            <button onclick="removeQuestionInEdit(${qIdx})" 
                                class="text-red-400 hover:text-red-600 p-2 rounded-full bg-red-50 hover:bg-red-100 transition shadow-sm" 
                                title="Xóa câu hỏi này">
                                <i data-lucide="minus-circle" size="18"></i>
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        };

const renderQuestionInputForm = () => {

                    <input id="opt-${idx}" class="flex-1 p-2 border rounded-lg focus:border-green-500 transition" placeholder="${placeholder}">
                </div>
            `;
            // Helper cho listen mcq
            const renderListenOptionRow = (idx, placeholder) => `
                <div class="flex items-center gap-3 mb-2">
                    <div class="flex items-center justify-center">
                        <input type="radio" name="lmcq_correct_input" value="${idx}" ${idx === 0 ? 'checked' : ''} 
                               class="w-6 h-6 text-green-600 bg-gray-100 border-gray-300 focus:ring-green-500 cursor-pointer accent-green-600" title="Chọn làm đáp án đúng">
                    </div>
                    <input id="lmcq-opt-${idx}" class="flex-1 p-2 border rounded-lg focus:border-green-500 transition" placeholder="${placeholder}">
                </div>
            `;

            switch (type) {
                // --- 1. TRẮC NGHIỆM (MCQ) - ĐÃ CẬP NHẬT GIAO DIỆN ---
                case 'mcq':
                    inputs = `
                        <input id="q-text" class="w-full p-2 border rounded-lg mb-4" placeholder="Nội dung câu hỏi">
                        <p class="text-xs font-bold text-slate-500 mb-2 uppercase">Nhập đáp án & Tích chọn câu đúng:</p>

                            ${renderOptionRow(0, 'Đáp án A')}
                            ${renderOptionRow(1, 'Đáp án B')}

                            ${renderOptionRow(3, 'Đáp án D')}
                        </div>
                    `;
                    break;

                case 'fib':
                    inputs = `
                        <p class="text-sm text-slate-500 mb-2">Sử dụng chuỗi <code>[BLANK]</code> để đánh dấu vị trí điền từ.</p>
                        <input id="fib-text" class="w-full p-2 border rounded-lg mb-3" placeholder="Ví dụ: Hôm nay tôi đi [BLANK]...">

                    `;
                    break;
                case 'jumble':
                    inputs = `
                        <p class="text-sm text-slate-500 mb-2">Nhập câu đúng. Các từ sẽ được tự động tách và xáo trộn.</p>

                    `;
                    break;
                case 'match':
                    inputs = `

if (!assign.questions.some(q => q.shuffledWords || q.shuffledColB || q.shuffledSentences)){ 
                assign.questions.forEach(q => {
                    if (q.type === 'jumble' && q.answer) {

window.updatePlayingUI = () => {
    const match = state.ui.activeMatch;
    const container = document.getElementById('match-playing-container');
    if (!match || !container) return;

    const qIndex = match.qIndex || 0;
    const q = match.questions[qIndex];
    
    // Kiểm tra xem người dùng hiện tại là Khán giả (Giáo viên) hay Người chơi
    const isSpectating = state.ui.competitionMode === 'spectating';

    // 1. Cập nhật Thanh Máu (Progress Bar)
    const maxScore = match.questions.length * 10;
    const p1Percent = Math.min((match.player1.score / maxScore) * 100, 100);
    const p2Percent = Math.min((match.player2.score / maxScore) * 100, 100);

    const p1Bar = container.querySelector('.bg-gradient-to-r'); 
    const p2Bar = container.querySelector('.bg-gradient-to-l'); 

    if(p1Bar) {
        p1Bar.style.width = `${p1Percent}%`;
        // LOGIC MỚI: Chỉ hiện điểm trong thanh nếu là NGƯỜI CHƠI.
        // Nếu là khán giả (giáo viên), để rỗng vì đã có hiển thị ở tên rồi.
        p1Bar.innerHTML = (!isSpectating && match.player1.score > 0) 
            ? `<span class="text-[10px] text-white font-bold animate-in fade-in zoom-in">${match.player1.score}</span>` 
            : '';
    }
    
    if(p2Bar) {
        p2Bar.style.width = `${p2Percent}%`;
        // Tương tự cho Player 2
        p2Bar.innerHTML = (!isSpectating && match.player2.score > 0)
            ? `<span class="text-[10px] text-white font-bold animate-in fade-in zoom-in">${match.player2.score}</span>` 
            : '';
    }

    // --- Cập nhật TEXT điểm số (Dành cho Giáo viên/Khán giả xem) ---
    // Phần này sẽ hiển thị điểm số to rõ bên cạnh tên người chơi
    const specP1 = document.getElementById('spec-p1-score');
    const specP2 = document.getElementById('spec-p2-score');
    if (specP1) specP1.textContent = match.player1.score;
    if (specP2) specP2.textContent = match.player2.score;
    
    // Cập nhật bộ đếm câu hỏi
    const counterEl = document.getElementById('q-counter');
    if (counterEl) {
        const prefix = isSpectating ? 'Câu hỏi ' : 'Q';
        counterEl.textContent = `${prefix}${qIndex + 1}/${match.questions.length}`;
    }

    // 2. Render nội dung câu hỏi (Giữ nguyên logic cũ)
    const grid = document.getElementById('options-grid');
    if (!grid) return; 

    const currentRenderedQId = grid.getAttribute('data-qid');
    if (currentRenderedQId !== String(qIndex)) {
        state.ui.hasAnsweredCurrentQ = false;
        state.ui.matchQIndex = qIndex;
        grid.setAttribute('data-qid', qIndex);

        const qTextEl = document.getElementById('q-text');
        if (qTextEl) {
            qTextEl.innerHTML = typeof formatText === 'function' ? formatText(q.text) : q.text;
            qTextEl.classList.remove('fade-in');
            void qTextEl.offsetWidth; 
            qTextEl.classList.add('fade-in');
        }

        // Render Audio (Giữ nguyên)
        const audioContainer = document.getElementById('audio-container');
        if (audioContainer) {
            const audioUrl = q.audioUrl;
            const audioText = q.audioWord || q.audioSentence || q.audioText;
            
            if (audioUrl) {
                const audioId = `arena-audio-${qIndex}`;
                audioContainer.innerHTML = `
                    <audio id="${audioId}" src="${audioUrl}" style="display:none"></audio>
                    <button id="btn-play-audio" onclick="playCustomAudio('${audioId}', this)" class="flex items-center gap-2 bg-purple-100 text-purple-700 px-5 py-2 rounded-full font-bold hover:bg-purple-200 transition shadow-sm animate-bounce-in ring-2 ring-purple-200">
                        <i data-lucide="volume-2" size="20"></i> Nghe Audio Gốc
                    </button>`;
                setTimeout(() => { 
                    const btn = document.getElementById('btn-play-audio'); 
                    if(btn && typeof playCustomAudio === 'function') playCustomAudio(audioId, btn); 
                }, 500);
            } else if (audioText) {
                audioContainer.innerHTML = `
                    <button onclick="speakWord('${audioText.replace(/'/g, "\\'")}', 'zh-CN')" class="flex items-center gap-2 bg-yellow-100 text-yellow-700 px-4 py-2 rounded-full font-bold hover:bg-yellow-200 transition shadow-sm animate-bounce-in">
                        <i data-lucide="volume-2" size="20"></i> Nghe câu hỏi (Máy đọc)
                    </button>`;
                setTimeout(() => { if(typeof speakWord === 'function') speakWord(audioText, 'zh-CN') }, 500);
            } else {
                audioContainer.innerHTML = '';
            }
        }

        // Render Options (Giữ nguyên)
        if (isSpectating) {
            grid.innerHTML = q.options.map((opt) => `
                <div class="p-4 border-2 border-slate-100 rounded-xl text-lg font-medium text-slate-600 bg-slate-50">
                    ${opt}
                </div>
            `).join('');
        } else {
            grid.innerHTML = q.options.map((opt, idx) => `
                <button id="opt-btn-${idx}" onclick="handleAnswerAttempt(${idx === q.correct}, '${match.id}', ${idx})" 
                    class="group relative p-4 md:p-6 bg-white border-2 border-slate-200 rounded-2xl text-lg md:text-xl font-bold text-slate-700 transition-all hover:border-blue-400 hover:shadow-md active:scale-95 flex items-center justify-center text-center">

                        ${String.fromCharCode(65 + idx)}
                    </span>
                    ${opt}
                </button>
            `).join('');
        }
        if(typeof renderIcons === 'function') renderIcons();
    }
};

        window.handleArenaInputAnswer = async (mid) => {
             const match = state.ui.activeMatch;

             const qIndex = match.qIndex || 0;
             const q = match.questions[qIndex];
             const userAnswer = (document.getElementById(`arena-input-q-${qIndex}`).value || '').trim().toLowerCase();
             const correctAnswer = (q.correct || '').trim().toLowerCase();

             const isCorrect = userAnswer === correctAnswer;
             
             state.ui.hasAnsweredCurrentQ = true;
             
             const inputEl = document.getElementById(`arena-input-q-${qIndex}`);
             inputEl.disabled = true;
             
             if (isCorrect) {
                  inputEl.classList.add('bg-green-100', 'border-green-600');
                  showToast("Chính xác!", "success");
             } else {
                 inputEl.classList.add('bg-red-100', 'border-red-600');
                 showToast(`Sai! Đáp án đúng là: ${q.correct}`, "error");
             }
             
             if (isCorrect) {
                 try {
                     await runTransaction(db, async (transaction) => {
                         const matchRef = doc(db, getPath('matches'), mid);
                         const matchDoc = await transaction.get(matchRef);

                         if (!matchDoc.exists) { throw "Match does not exist!"; }

                         const matchData = matchDoc.data();
                         const currentQIndex = matchData.qIndex || 0;
                         const questionsLength = matchData.questions.length;

                         if (currentQIndex === state.ui.matchQIndex) {
                             const isP1 = match.player1.uid === state.user.uid;
                             const newScore = (isP1 ? matchData.player1.score : matchData.player2.score) + 10;
                             const nextQIndex = currentQIndex + 1;
                             
                             const updateData = {};
                             updateData[isP1 ? "player1.score" : "player2.score"] = newScore;
                             
                             if (nextQIndex < questionsLength) {
                                 updateData.qIndex = nextQIndex;
                             } else {
                                 updateData.status = 'finished';
                             }
                             
                             transaction.update(matchRef, updateData);
                             
                             if (updateData.status === 'finished') {
                                 transaction.update(matchRef, {...updateData, winnerScore: newScore, finishedBy: state.user.uid});
                             }

                             state.ui.matchQIndex = nextQIndex;
                             updatePlayingUI();
                         }
                     });
                 } catch (e) {
                     console.error("Transaction failed:", e);
                 }
             } else {
                 setTimeout(() => {
                    if (state.ui.activeMatch) {
                        state.ui.matchQIndex = state.ui.activeMatch.qIndex || 0;
                    }
                    state.ui.hasAnsweredCurrentQ = false;

 // --- XỬ LÝ TRẢ LỜI (DÙNG TRANSACTION ĐỂ ĐỒNG BỘ) ---
        window.handleAnswerAttempt = async (isCorrect, mid, optionIndex) => {
             const match = state.ui.activeMatch;
             // Chặn nếu trận đấu không diễn ra hoặc người chơi đã trả lời câu này rồi
             if (!match || match.status !== 'playing' || state.ui.hasAnsweredCurrentQ) return;
             
             // Hiệu ứng Click ngay lập tức (Optimistic UI)
             const btn = document.getElementById(`opt-btn-${optionIndex}`);
             if (btn) {
                 btn.classList.add('scale-95'); // Nhấn xuống
                 if (!isCorrect) {
                     // Nếu sai: Hiện màu đỏ ngay và khóa tạm thời
                     btn.classList.remove('bg-white', 'hover:bg-blue-50');
                     btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                     showToast("Sai rồi! Bị phạt chờ 5 giây.", "error");
                     
                     // Logic phạt: Khóa người chơi trong 5s
                     state.ui.hasAnsweredCurrentQ = true; 
                     setTimeout(() => {
                         state.ui.hasAnsweredCurrentQ = false; // Mở khóa
                         if(btn) {
                             btn.classList.remove('bg-red-500', 'text-white', 'border-red-600');
                             btn.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed'); // Disable nút sai
                             btn.disabled = true;
                         }
                     }, 5000);
                     return; // Dừng lại, không gửi lên server
                 }
             }

             // Nếu ĐÚNG: Gửi transaction lên Server
             state.ui.hasAnsweredCurrentQ = true; // Khóa tạm thời để tránh spam
             if (btn) btn.classList.add('bg-green-500', 'text-white', 'border-green-600'); // Hiện xanh lá

             try {
                 await runTransaction(db, async (transaction) => {
                     const matchRef = doc(db, getPath('matches'), mid);
                     const matchDoc = await transaction.get(matchRef);

                     if (!matchDoc.exists) { throw "Trận đấu không tồn tại!"; }

                     const matchData = matchDoc.data();
                     
                     // Kiểm tra xem câu hỏi này đã bị ai trả lời xong chưa (đề phòng race condition)
                     // Ở đây logic là: Ai trả lời đúng thì next câu hỏi cho CẢ HAI.
                     // Nên ta so sánh qIndex cục bộ với server.
                     if (matchData.qIndex !== state.ui.matchQIndex) {
                         throw "Câu hỏi này đã kết thúc!";
                     }

                     const isP1 = matchData.player1.uid === state.user.uid;
                     
                     // Cộng điểm
                     const newScore = (isP1 ? matchData.player1.score : matchData.player2.score) + 10;
                     const nextQIndex = matchData.qIndex + 1;
                     const questionsLength = matchData.questions.length;

                     const updateData = {};
                     // Cập nhật điểm người thắng câu này
                     updateData[isP1 ? "player1.score" : "player2.score"] = newScore;
                     
                     // QUAN TRỌNG: Tăng qIndex để chuyển câu hỏi cho CẢ HAI NGƯỜI
                     if (nextQIndex < questionsLength) {
                         updateData.qIndex = nextQIndex;
                     } else {
                         updateData.status = 'finished';
                         updateData.winnerScore = newScore;
                         updateData.finishedBy = state.user.uid;
                     }
                     
                     transaction.update(matchRef, updateData);
                 });
                 
                 // Hiệu ứng âm thanh hoặc toast chiến thắng câu hỏi
                 // showToast("Chính xác! +10 điểm", "success");

             } catch (e) {
                 console.log("Transaction skipped/failed:", e);
                 // Nếu lỗi (do người kia trả lời nhanh hơn), UI sẽ tự update qua onSnapshot
             }
         };

                return renderTeacherArenaDashboard();

            // Các chế độ bình thường cho Học sinh
            switch(mode) {

        };
        
        // --- Handlers Modal Nhập dữ liệu (Giữ nguyên) ---
        
        // Mở/đóng modal nhập liệu
        window.toggleImportData = (val, fromBankForm = false) => {
            state.ui.isImportingBankData = val;
            // Nếu mở modal từ trong form tạo/sửa bank, reset importQType và giữ bankMode

                 setBankMode('create');
            }
            renderApp();
        }

        window.setImportQType = (type) => { state.ui.importQType = type; renderApp(); };

        // Hàm xử lý việc đọc và phân tích file
        window.handleFileImport = () => {
            const fileInput = document.getElementById('file-upload');
            if (!fileInput.files.length) {
                return showToast("Vui lòng chọn file .txt để tải lên.", "error");
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            const qType = state.ui.importQType;

            reader.onload = (e) => {
                const text = e.target.result;
                const newQuestions = parseFileContent(text, qType);

                if (newQuestions.length > 0) {
                    state.ui.newAssignment.questions.push(...newQuestions);
                    showToast(`Đã thêm thành công ${newQuestions.length} câu hỏi mới!`);
                    toggleImportData(false); // Đóng modal và render lại form
                } else {
                    showToast("File không có nội dung hợp lệ hoặc sai định dạng. Vui lòng kiểm tra lại cấu trúc file TXT.", "error");
                }
            };

            reader.onerror = () => {
                showToast("Lỗi đọc file.", "error");
            };

            reader.readAsText(file);
        };
        
        // Logic phân tích cú pháp file content
// --- LOGIC PHÂN TÍCH FILE TEXT (ĐÃ CẬP NHẬT TRỘN ĐÁP ÁN) ---
// --- LOGIC PHÂN TÍCH FILE TEXT (ĐÃ CẬP NHẬT TẠO DISTRACTORS TỪ FILE) ---
// --- LOGIC PHÂN TÍCH FILE TEXT (ĐÃ CẬP NHẬT TRỘN ĐÁP ÁN NGẪU NHIÊN) ---
// --- LOGIC PHÂN TÍCH FILE TEXT (ĐÃ SỬA: BỎ DẤU SAO **, THAY BẰNG MÀU XANH IN ĐẬM) ---
// --- LOGIC PHÂN TÍCH FILE TEXT (ĐÃ CẬP NHẬT: THÊM DẠNG NGHĨA -> TỪ) ---
// --- LOGIC PHÂN TÍCH FILE TEXT (PHIÊN BẢN NÂNG CẤP HỖ TRỢ HỘI THOẠI) ---
        const parseFileContent = (text, qType) => {
            // Hàm trộn mảng (Shuffle)
            const shuffle = (array) => {
                let currentIndex = array.length, randomIndex;
                while (currentIndex != 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            };

            const newQuestions = [];
            
            // --- XỬ LÝ RIÊNG CHO DẠNG HỘI THOẠI (Cấu trúc Block ngăn cách bởi dấu #) ---
            if (qType === 'listen_conversation') {
                // 1. Tách các bài tập theo dấu #
                const blocks = text.split('#').map(b => b.trim()).filter(b => b.length > 0);
                
                // Lấy thông tin bài học để tạo đường dẫn audio
                const lvl = document.getElementById('assign-level') ? document.getElementById('assign-level').value : 'H1';
                const lsn = document.getElementById('assign-lesson') ? document.getElementById('assign-lesson').value : 'Bai1';
                const folderPath = `data_Edubattle/${lvl}_${lsn}`;

                blocks.forEach(block => {
                    try {
                        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                        let scriptLines = [];
                        let questionLine = null;
                        let answerLine = null;

                        // 2. Phân loại từng dòng trong block
                        lines.forEach(line => {
                            if (line.startsWith('[HT')) {
                                questionLine = line;
                            } else if (line.startsWith('[TL]')) {
                                answerLine = line;
                            } else {
                                scriptLines.push(line);
                            }
                        });

                        if (questionLine && answerLine) {
                            // 3. Xử lý dòng Câu hỏi: [HT1] B是谁？ -> File: HT1, Text: B是谁？
                            // Regex lấy nội dung trong [] và nội dung phía sau
                            const qMatch = questionLine.match(/\[(.*?)\]\s*(.*)/);
                            if (!qMatch) return;
                            
                            const audioFileName = qMatch[1].trim(); // VD: HT1
                            const questionText = qMatch[2].trim();  // VD: B是谁？

                            // 4. Xử lý dòng Đáp án: [TL] 老师|学生*|我|你
                            const rawAnswers = answerLine.replace('[TL]', '').split('|').map(a => a.trim());
                            let correctIndex = -1;
                            
                            // Tìm đáp án có dấu * và xóa dấu * đi
                            const cleanOptions = rawAnswers.map((ans, idx) => {
                                if (ans.endsWith('*')) {
                                    correctIndex = idx;
                                    return ans.slice(0, -1); // Cắt bỏ dấu *
                                }
                                return ans;
                            });

                            if (correctIndex === -1) correctIndex = 0; // Fallback nếu quên đánh dấu *

                            // 5. Tạo câu hỏi hoàn chỉnh
                            newQuestions.push({
                                type: 'listen_conversation',
                                audioText: audioFileName,
                                audioUrl: `${folderPath}/${audioFileName}.mp3`,
                                conversationContent: scriptLines.join('\n'), // Ghép script lại
                                text: questionText,
                                options: cleanOptions,
                                correct: correctIndex
                            });
                        }
                    } catch (e) {
                        console.error("Lỗi parse block hội thoại:", e);
                    }
                });
                
                return newQuestions;
            }
            // -----------------------------------------------------------
            // XỬ LÝ RIÊNG CHO DẠNG SẮP XẾP CÂU (Cấu trúc Block với dấu #)
            // -----------------------------------------------------------
             if (qType === 'order_sentences') {
                const blocks = text.split('#').map(b => b.trim()).filter(b => b.length > 0);
                
                blocks.forEach(block => {
                    try {
                        // Tách từng dòng, mỗi dòng là một câu
                        const sentences = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                        
                        if (sentences.length >= 2) {
                            newQuestions.push({
                                type: 'order_sentences',
                                text: "Sắp xếp thứ tự các câu cho đúng:",
                                answer: sentences // Lưu thứ tự đúng
                            });
                        }
                    } catch (e) {
                        console.error("Lỗi parse block sắp xếp câu:", e);
                    }
                });
                return newQuestions;
            }
if (qType === 'reading_comprehension') {
                const blocks = text.split('#').map(b => b.trim()).filter(b => b.length > 0);

                blocks.forEach(block => {
                    try {
                        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                        let passageLines = [];
                        let questionLine = null;
                        let answerLine = null;

                        lines.forEach(line => {
                            if (line.startsWith('[H]')) {
                                questionLine = line;
                            } else if (line.startsWith('[TL]')) {
                                answerLine = line;
                            } else {
                                passageLines.push(line);
                            }
                        });

                        if (questionLine && answerLine && passageLines.length > 0) {
                            // [H] Câu hỏi... -> Lấy phần sau [H]
                            const questionText = questionLine.replace('[H]', '').trim();

                            // [TL] A|B*|C...
                            const rawAnswers = answerLine.replace('[TL]', '').split('|').map(a => a.trim());
                            let correctIndex = -1;
                            
                            const cleanOptions = rawAnswers.map((ans, idx) => {
                                if (ans.endsWith('*')) {
                                    correctIndex = idx;
                                    return ans.slice(0, -1);
                                }
                                return ans;
                            });

                            if (correctIndex === -1) correctIndex = 0;

                            newQuestions.push({
                                type: 'reading_comprehension',
                                conversationContent: passageLines.join('\n'), // Lưu đoạn văn
                                text: questionText,
                                options: cleanOptions,
                                correct: correctIndex
                            });
                        }
                    } catch (e) {
                        console.error("Lỗi parse block đọc hiểu:", e);
                    }
                });
                return newQuestions;
            }
            // --- CÁC DẠNG CŨ (XỬ LÝ THEO DÒNG) ---
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            // ... (Giữ nguyên logic tạo tempVocabList và getDistractors như cũ) ...
            const tempVocabList = [];
            lines.forEach(line => {
                const parts = line.split('|');
                if (parts.length >= 3) {
                    tempVocabList.push({ word: parts[0].trim(), pinyin: parts[1].trim(), meaning: parts[2].trim() });
                }
            });
            while (tempVocabList.length < 4) { tempVocabList.push({ word: 'Ví dụ', pinyin: 'lìrú', meaning: 'Mẫu' }); }
            const getDistractors = (correctValue, field) => {
                const distractors = [];
                const candidates = shuffle([...tempVocabList]); 
                for (const item of candidates) {
                    const value = item[field];
                    if (value !== correctValue && !distractors.includes(value)) distractors.push(value);
                    if (distractors.length === 3) break;
                }
                while (distractors.length < 3) distractors.push(`Lựa chọn ${distractors.length + 1}`);
                return distractors;
            };

            // Loop các dòng cho dạng cũ
            lines.forEach(line => {
                try {
                    const lvl = document.getElementById('assign-level') ? document.getElementById('assign-level').value : 'H1';
                    const lsn = document.getElementById('assign-lesson') ? document.getElementById('assign-lesson').value : 'Bai1';
                    const folderPath = `data_Edubattle/${lvl}_${lsn}`;

                    switch (qType) {
                        case 'vocab_mcq':
                            const parts_v = line.split('|');
                            if (parts_v.length < 3) return;
                            const [word, pinyin, meaning] = parts_v.map(p => p.trim());
                            
                            let optionsM = [meaning, ...getDistractors(meaning, 'meaning')];
                            optionsM = shuffle(optionsM); 
                            newQuestions.push({ type: 'mcq', text: `Nghĩa của từ <span class="font-bold text-blue-600 text-xl mx-1">${word}</span> là gì?`, options: optionsM, correct: optionsM.indexOf(meaning) });

                            let optionsP = [pinyin, ...getDistractors(pinyin, 'pinyin')];
                            optionsP = shuffle(optionsP); 
                            newQuestions.push({ type: 'mcq', text: `Pinyin của từ <span class="font-bold text-blue-600 text-xl mx-1">${word}</span> là gì?`, options: optionsP, correct: optionsP.indexOf(pinyin) });

                            let optionsW = [word, ...getDistractors(word, 'word')];
                            optionsW = shuffle(optionsW); 
                            newQuestions.push({ type: 'mcq', text: `Từ có nghĩa là: <span class="font-bold text-blue-600 text-xl mx-1">"${meaning}"</span>?`, options: optionsW, correct: optionsW.indexOf(word) });
                            break;

                        case 'listen_mcq':
                            const parts_l = line.split('|');
                            if (parts_l.length < 3) return;
                            const [word_l, pinyin_l, meaning_l] = parts_l.map(p => p.trim());
                            let options_l = [meaning_l, ...getDistractors(meaning_l, 'meaning')];
                            options_l = shuffle(options_l); 
                            newQuestions.push({ type: 'listen_mcq', audioText: word_l, audioUrl: `${folderPath}/${word_l}.mp3`, text: "Nghe âm thanh và chọn nghĩa đúng:", options: options_l, correct: options_l.indexOf(meaning_l) });
                            break;

                        case 'fib': 
                            const match_fib = line.match(/\|([^|]+)\|/);
                            if (match_fib) {
                                newQuestions.push({ type: 'fib', text: line.replace(/\|[^|]+\|/, '[BLANK]').trim(), answer: match_fib[1].trim() });
                            }
                            break;

                        case 'jumble':
                            const words = line.split(/\s+/).filter(w => w.length > 0);
                            if (words.length >= 2) newQuestions.push({ type: 'jumble', text: "Sắp xếp các từ thành câu đúng:", answer: words });
                            break;

                        case 'translation':
                        case 'listen_translate':
                        case 'listen_write':
                            const parts_common = line.split('|');
                            if (parts_common.length >= 2) {
                                const [tc, tv] = parts_common.map(p => p.trim());
                                const audioCommon = `${folderPath}/${tc}.mp3`;
                                if (qType === 'translation') newQuestions.push({ type: 'translation', vietnamese: tv, chinese: tc, text: tv });
                                else if (qType === 'listen_translate') newQuestions.push({ type: 'listen_translate', audioText: tc, audioUrl: audioCommon, answer: tv, text: "Nghe câu và dịch nghĩa sang tiếng Việt." });
                                else newQuestions.push({ type: 'listen_write', audioText: tc, audioUrl: audioCommon, answer: tc, text: "Nghe câu và viết lại." });
                            }

window.selectQuestionFromBank = (qIndex) => {
            const scrollContainer = document.getElementById('bank-scroll-view');
            let savedScrollTop = 0;
            if (scrollContainer) savedScrollTop = scrollContainer.scrollTop;

            const selectedBank = state.data.questionBanks.find(b => b.id === state.ui.selectedBankId);
            if (!selectedBank) return;

            const questionToToggle = selectedBank.questions[qIndex];
            
            // XÁC ĐỊNH DANH SÁCH CẦN THAO TÁC
            let currentQs;
            if (state.view === 'challenges') {
                if (!state.ui.activeChallenge.questions) state.ui.activeChallenge.questions = [];

            } else {
                if (!state.ui.newAssignment.questions) state.ui.newAssignment.questions = [];
                currentQs = state.ui.newAssignment.questions;
            }

            // Logic thêm/xóa
            const existingIndex = currentQs.findIndex(existQ => 
                JSON.stringify({t: existQ.text, o: existQ.options, a: existQ.answer}) === 
                JSON.stringify({t: questionToToggle.text, o: questionToToggle.options, a: questionToToggle.answer})
            );

            if (existingIndex !== -1) {
                currentQs.splice(existingIndex, 1);
            } else {
                currentQs.push(questionToToggle);
            }

            renderApp();

            const newScrollContainer = document.getElementById('bank-scroll-view');
            if (newScrollContainer) newScrollContainer.scrollTop = savedScrollTop;
        };
        
window.addRandomQuestions = (bankId) => {
            const selectedBank = state.data.questionBanks.find(b => b.id === bankId);
            if (!selectedBank) return showToast("Lỗi: Không tìm thấy ngân hàng đề.", "error");

            const availableQuestions = selectedBank.questions;
            
            // XÁC ĐỊNH DANH SÁCH ĐÍCH (ĐÃ SỬA: targetList chính là currentAssignmentQs)
            let targetList;
            if (state.view === 'challenges') {
                if (!state.ui.activeChallenge.questions) state.ui.activeChallenge.questions = [];
                targetList = state.ui.activeChallenge.questions;
            } else {
                targetList = state.ui.newAssignment.questions;
            }
            
            // Đặt tên biến dễ hiểu để dùng bên dưới
            const currentAssignmentQs = targetList; 

            let totalAdded = 0;
            const typesInBank = [...new Set(availableQuestions.map(q => q.type))];

            typesInBank.forEach(type => {
                const inputEl = document.getElementById(`count-for-${type}`);
                if (!inputEl) return;

                const countNeeded = parseInt(inputEl.value) || 0;
                if (countNeeded <= 0) return;

                // 1. Lọc ra các câu hỏi thuộc loại này
                const qsByType = availableQuestions.filter(q => q.type === type);

                // 2. Lọc trùng nội dung
                const uniqueCandidates = [];
                const seenContent = new Set();

                qsByType.forEach(q => {
                    const contentSignature = JSON.stringify({
                        text: q.text,
                        vietnamese: q.vietnamese,
                        audioText: q.audioText,
                        options: q.options,
                        answer: q.answer,
                        pairs: q.pairs
                    });

                    if (!seenContent.has(contentSignature)) {
                        seenContent.add(contentSignature);
                        uniqueCandidates.push(q);
                    }
                });

                // 3. Lọc bỏ các câu đã có trong bài tập hiện tại
                const finalCandidates = uniqueCandidates.filter(q => 
                    !currentAssignmentQs.some(existQ => {
                        const sig1 = JSON.stringify({t: q.text, o: q.options, a: q.answer});
                        const sig2 = JSON.stringify({t: existQ.text, o: existQ.options, a: existQ.answer});
                        return sig1 === sig2;
                    })
                );

                if (finalCandidates.length < countNeeded) {
                    showToast(`Loại "${getQuestionTypeLabel(type)}" chỉ còn ${finalCandidates.length} câu chưa sử dụng.`, "warning");
                }

                // 4. Trộn ngẫu nhiên
                let shuffled = [...finalCandidates]; 
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }

                // 5. Cắt và thêm
                const selected = shuffled.slice(0, countNeeded);
                targetList.push(...selected); // Thêm vào danh sách đích
                totalAdded += selected.length;
            });

            if (totalAdded > 0) {
                showToast(`Đã thêm ngẫu nhiên ${totalAdded} câu hỏi!`, "success");
                setSelectingBankQuestions(false); // Đóng modal
                renderApp(); 
            } else {
                showToast("Vui lòng nhập số lượng câu hỏi cần lấy (lớn hơn 0).", "error");
            }
        };

window.addQuestion = () => {
            const type = state.ui.newQuestionType;
            let newQ = { type };
            let isValid = false;

            // 1. LẤY GIÁ TRỊ CẤP ĐỘ VÀ BÀI HỌC
            const lvl = document.getElementById('assign-level') ? document.getElementById('assign-level').value : 'H1';
            const lsn = document.getElementById('assign-lesson') ? document.getElementById('assign-lesson').value : 'Bai1';
            const folderName = `${lvl}_${lsn}`;

            // Helper tạo đường dẫn local
            const createLocalPath = (filename) => {
                if(!filename) return null;
                return `data_Edubattle/${folderName}/${filename.trim()}.mp3`;
            };

            try {
                switch(type) {
                    // --- 1. TRẮC NGHIỆM (MCQ) - LOGIC MỚI ---
                    case 'mcq':
                         const txt = document.getElementById('q-text').value;
                         const opts = [
                            document.getElementById('opt-0').value,
                            document.getElementById('opt-1').value,
                            document.getElementById('opt-2').value,
                            document.getElementById('opt-3').value
                        ];
                        
                        // Lấy đáp án đúng từ Radio Button
                        const checkedRadio = document.querySelector('input[name="mcq_correct_input"]:checked');
                        if (!checkedRadio) throw new Error("Vui lòng tích chọn đáp án đúng.");
                        const correct = parseInt(checkedRadio.value);

                        if(!txt || opts.some(o => !o)) throw new Error("Vui lòng điền đầy đủ nội dung.");
                        newQ = { ...newQ, text: txt, options: opts, correct };
                        isValid = true;
                        break;

                    case 'fib':
                        const fibText = document.getElementById('fib-text').value;
                        const fibAnswer = document.getElementById('fib-answer').value.trim();
                        if (!fibText.includes('[BLANK]')) throw new Error("Thiếu [BLANK].");
                        if (!fibAnswer) throw new Error("Thiếu đáp án.");
                        newQ = { ...newQ, text: fibText, answer: fibAnswer };
                        isValid = true;
                        break;
                    case 'jumble':
                        const jumbleText = document.getElementById('jumble-answer').value.trim();
                        if (!jumbleText) throw new Error("Thiếu câu đúng.");
                        const words = jumbleText.split(/\s+/).filter(w => w.length > 0);
                        if (words.length < 2) throw new Error("Câu quá ngắn.");
                        newQ = { ...newQ, text: jumbleText, answer: words }; 
                        isValid = true;
                        break;
                    case 'match':
                         const pairs = [];
                        for(let i=0; i<3; i++) {
                            const a = document.getElementById(`match-a${i}`).value.trim();
                            const b = document.getElementById(`match-b${i}`).value.trim();
                            if (!a || !b) throw new Error(`Thiếu cặp ${i+1}.`);
                            pairs.push({ a, b });
                        }
                        newQ = { ...newQ, pairs, text: "Ghép đôi các mục sau:" };
                        isValid = true;
                        break;
                    case 'translation':
                        const vn = document.getElementById('trans-vn').value.trim();
                        const cn = document.getElementById('trans-cn').value.trim();
                        if (!vn || !cn) throw new Error("Thiếu nội dung.");
                        newQ = { ...newQ, vietnamese: vn, chinese: cn, text: vn };
                        isValid = true;
                        break;

                    // --- 2. NGHE TRẮC NGHIỆM (LISTEN MCQ) - LOGIC MỚI ---
                    case 'listen_mcq':
                        const lmcqAudio = document.getElementById('listen-mcq-audio').value.trim();
                        const lmcqOpts = [
                            document.getElementById('lmcq-opt-0').value,
                            document.getElementById('lmcq-opt-1').value,
                            document.getElementById('lmcq-opt-2').value,
                            document.getElementById('lmcq-opt-3').value
                        ];
                        
                        // Lấy đáp án đúng từ Radio Button (name khác với mcq thường)
                        const checkedListenRadio = document.querySelector('input[name="lmcq_correct_input"]:checked');
                        if (!checkedListenRadio) throw new Error("Vui lòng tích chọn đáp án đúng.");
                        const lmcqCorrect = parseInt(checkedListenRadio.value);
                        
                        if(!lmcqAudio || lmcqOpts.some(o => !o)) throw new Error("Vui lòng nhập tên file âm thanh và đáp án.");
                        
                        newQ = { 
                            ...newQ, 
                            audioText: lmcqAudio, 
                            audioUrl: createLocalPath(lmcqAudio), 
                            text: "Nghe âm thanh và chọn nghĩa đúng:", 
                            options: lmcqOpts, 
                            correct: lmcqCorrect 
                        };
                        isValid = true;
                        break;

                    case 'listen_write':
                        const lwAudio = document.getElementById('listen-write-audio').value.trim();
                        const lwAnswer = document.getElementById('listen-write-answer').value.trim();
                        if (!lwAudio || !lwAnswer) throw new Error("Thiếu tên file hoặc đáp án.");
                        
                        newQ = { 
                            ...newQ, 
                            audioText: lwAudio, 
                            audioUrl: createLocalPath(lwAudio),
                            answer: lwAnswer, 
                            text: "Nghe câu và viết lại." 
                        }; 
                        isValid = true;
                        break;

                    case 'listen_translate':
                        const ltAudio = document.getElementById('listen-trans-audio').value.trim();
                        const ltAnswer = document.getElementById('listen-trans-answer').value.trim();
                        if (!ltAudio || !ltAnswer) throw new Error("Thiếu tên file hoặc đáp án.");
                        
                        newQ = { 
                            ...newQ, 
                            audioText: ltAudio, 
                            audioUrl: createLocalPath(ltAudio),
                            answer: ltAnswer, 
                            text: "Nghe câu và dịch nghĩa sang tiếng Việt." 
                        }; 
                        isValid = true;
                        break;
                      case 'order_sentences':
                        const rawText = document.getElementById('order-sentences-input').value.trim();
                        if (!rawText) throw new Error("Vui lòng nhập nội dung các câu.");
                        
                        // Tách dòng và lọc bỏ dòng trống
                        const sentences = rawText.split('\n').map(s => s.trim()).filter(s => s.length > 0);
                        
                        if (sentences.length < 2) throw new Error("Vui lòng nhập ít nhất 2 câu để sắp xếp.");

                        newQ = { 
                            ...newQ, 
                            text: "Sắp xếp các câu sau cho đúng:", 
                            answer: sentences // Lưu mảng câu đúng thứ tự
                        };

window.saveManualGrade = async (subId, qIdx, maxPoints) => {
    const inputEl = document.getElementById(`manual-score-${qIdx}`);
    let manualScoreInput = parseFloat(inputEl.value);

    // Validate đầu vào
    if (isNaN(manualScoreInput) || manualScoreInput < 0 || manualScoreInput > maxPoints) {
        return showToast(`Điểm phải từ 0 đến ${maxPoints.toFixed(2)}`, "error");
    }

    // Hiển thị loading
    const saveBtn = inputEl.nextElementSibling;
    const originalBtnContent = saveBtn.innerHTML;
    saveBtn.disabled = true;
    saveBtn.innerHTML = `<i class="animate-spin" data-lucide="loader-2"></i>`;
    renderIcons();

    try {
        await runTransaction(db, async (transaction) => {
            // 1. Lấy dữ liệu bài nộp
            const subRef = doc(db, getPath('submissions'), subId);
            const subDoc = await transaction.get(subRef);
            if (!subDoc.exists()) throw "Bài nộp không tồn tại";
            const subData = subDoc.data();

            // 2. Lấy dữ liệu đề bài (để chấm lại từ đầu)
            // Cần lấy đúng đề bài (nếu là đề thi trong session hoặc đề thường)
            const assign = state.data.assignments.find(a => a.id === subData.assignmentId);
            if (!assign) throw "Không tìm thấy đề bài gốc";

            // 3. Cập nhật điểm chấm thủ công vào object
            const currentManualGrades = subData.manualGrades || {};
            currentManualGrades[qIdx] = manualScoreInput;

            // 4. TÍNH TOÁN LẠI TOÀN BỘ (RECALCULATE)
            let newTotalScore = 0;
            let newCorrectCount = 0;
            const totalQuestions = assign.questions.length;
            const scorePerQuestion = 100 / totalQuestions;

            assign.questions.forEach((q, idx) => {
                let isCorrect = false;
                let questionScore = 0;
                
                // A. Xử lý câu TỰ LUẬN (Dùng điểm giáo viên vừa chấm)
                if (['make_sentence', 'image_describe'].includes(q.type)) {
                    const mScore = currentManualGrades[idx] !== undefined ? currentManualGrades[idx] : 0;
                    questionScore = mScore;
                    
                    // Quy ước: Nếu được >= 50% số điểm của câu đó thì tính là 1 câu đúng
                    if (mScore >= (scorePerQuestion / 2)) {
                        isCorrect = true;
                    }
                } 
                // B. Xử lý câu TRẮC NGHIỆM/TỰ ĐỘNG (Logic cũ)
                else {
                    const userAns = subData.answers[idx];
                    // Logic check đúng sai y hệt hàm submitAssignment
                    switch(q.type) {
                        case 'mcq': case 'listen_mcq': case 'listen_conversation': case 'reading_comprehension':
                            isCorrect = userAns === q.correct; break;
                        case 'fib': case 'translation': case 'listen_write': case 'listen_translate':
                            if (userAns) isCorrect = userAns.trim().toLowerCase() === (q.type === 'translation' ? q.chinese : q.answer).trim().toLowerCase(); break;
                        case 'jumble':
                            if (Array.isArray(userAns)) isCorrect = q.answer.join(' ') === userAns.join(' '); break;
                        case 'order_sentences':
                            if (Array.isArray(userAns)) isCorrect = JSON.stringify(userAns) === JSON.stringify(q.answer); break;
                        case 'match':
                            if (userAns) {
                                // Lưu ý: Với câu nối, cần check lại logic nếu muốn chính xác tuyệt đối, 
                                // ở đây tạm tính nếu đúng hết cặp mới được điểm (như logic nộp bài)
                                const questionData = subData.questionData?.[idx] || {};
                                const colBToUse = questionData.shuffledColB || q.pairs.map(p => p.b); // Cần logic match chính xác hơn nếu có shuffle
                                // Đơn giản hóa: nếu subData.answers khớp logic
                                // Để an toàn, ta giả định điểm cũ của câu này đã đúng nếu nó đóng góp vào score cũ.

    let savedScrollTop = 0;
    if (scrollContainer) savedScrollTop = scrollContainer.scrollTop;

    const selectedBank = state.data.questionBanks.find(b => b.id === state.ui.selectedBankId);
    if (!selectedBank) return;

    // --- FIX QUAN TRỌNG: XÁC ĐỊNH ĐÚNG NƠI LƯU (Thử thách hay Bài tập) ---
    let currentQs;
    if (state.view === 'challenges') {
        // Nếu đang ở màn hình Thử thách
        if (!state.ui.activeChallenge) state.ui.activeChallenge = {}; // Safety check
        if (!state.ui.activeChallenge.questions) state.ui.activeChallenge.questions = [];
        currentQs = state.ui.activeChallenge.questions;
    } else {
        // Nếu đang ở màn hình Bài tập
        if (!state.ui.newAssignment) state.ui.newAssignment = {}; // Safety check
        if (!state.ui.newAssignment.questions) state.ui.newAssignment.questions = [];
        currentQs = state.ui.newAssignment.questions;
    }

    // Sử dụng JSON.stringify để so sánh nội dung câu hỏi chính xác
    const existingIndex = currentQs.findIndex(existQ => 
        JSON.stringify({t: existQ.text, o: existQ.options, a: existQ.answer}) === 
        JSON.stringify({t: questionToToggle.text, o: questionToToggle.options, a: questionToToggle.answer})
    );

    let isSelectedNow = false;

    // Cập nhật State (Dữ liệu)
    if (existingIndex !== -1) {
        // Đã có -> Xóa đi
        currentQs.splice(existingIndex, 1);
        isSelectedNow = false;
    } else {
        // Chưa có -> Thêm vào

        isSelectedNow = true;

            btn.innerHTML = '<i data-lucide="plus" class="w-3 h-3"></i> Chọn';
        }
        // Render lại icon vừa thêm vào nút
        renderIcons();
    }

    // 2. Cập nhật con số tổng đếm trên Header
    const countEl = document.getElementById('total-selected-count');
    if (countEl) {
        countEl.textContent = currentQs.length;
        // Hiệu ứng nháy nhẹ để báo hiệu

        window.handleEditStudentPoints = async (uid, name, currentPoints) => {
            // Hiển thị prompt với giá trị mặc định là điểm hiện tại
            const input = prompt(
                `Nhập các điểm cộng thêm cách nhau bằng dấu cách (VD: "10 20 5").\nHệ thống sẽ tự động cộng vào tổng hiện tại.\n\nĐiểm hiện tại của ${name}:`, 
                currentPoints
            );
            
            if (input === null) return; // Người dùng ấn Hủy
            
            // --- LOGIC MỚI: XỬ LÝ CHUỖI NHẬP VÀO ---
            // 1. Dùng Regex để lấy tất cả các con số trong chuỗi (chấp nhận cả số âm như -10)
            const numbers = input.match(/-?\d+/g);
            
            if (!numbers || numbers.length === 0) {
                showToast("Vui lòng nhập ít nhất một con số!", "error");
                return;
            }
            
            // 2. Tính tổng tất cả các con số tìm được
            // Ví dụ: Nhập "368 10 20" -> 368 + 10 + 20 = 398
            const newPoints = numbers.reduce((sum, num) => sum + parseInt(num, 10), 0);
            
            // 3. Kiểm tra tính hợp lệ (Không cho phép điểm âm nếu muốn)
            if (newPoints < 0) {
                showToast("Tổng điểm sau khi tính toán không được âm!", "error");
                return;
            }
            
            // Nếu điểm không thay đổi thì thôi
            if (newPoints === currentPoints) return;

            try {
                // Cập nhật trực tiếp vào profile user
                await updateDoc(doc(db, getPath('users'), uid), {
                    points: newPoints
                });
                
                showToast(`Đã cập nhật: ${currentPoints} + [${input.replace(currentPoints, '').trim()}] = ${newPoints} điểm`);
            } catch (e) {
                console.error("Lỗi cập nhật điểm:", e);
                showToast("Lỗi khi cập nhật điểm số.", "error");
            }
        };

            const selectedBank = state.data.questionBanks.find(b => b.id === bankId);
            if (!selectedBank) return showToast("Không tìm thấy dữ liệu bộ đề.", "error");

            // 1. Lọc ra các câu hỏi phù hợp cho Đấu trường (Chỉ lấy câu có đáp án trắc nghiệm A,B,C,D)

            const validTypes = ['mcq', 'listen_mcq', 'listen_conversation', 'reading_comprehension', 'arena_quiz'];

            pool = pool.sort(() => Math.random() - 0.5).slice(0, 15);

                await addDoc(getRef('matches'), {

window.saveChallenge = async () => {
            const title = document.getElementById('chal-title').value;

            if (!title) return showToast("Thiếu tên thử thách!", "error");

                let questions = state.ui.activeChallenge.questions || [];

 // --- CẬP NHẬT: BẮT ĐẦU THỬ THÁCH (CÓ TRÁO ĐỀ) ---
// 2. Hàm Bắt đầu Thử thách
window.initDoChallenge = (id) => {
    const c = state.data.challenges.find(i => i.id === id);
    if (!c) return;

    // Tráo đề
    const shuffledQuestions = window.shuffleQuestionList(c.questions);

    // --- QUAN TRỌNG: LƯU VÀO BIẾN TOÀN CỤC ---
    window.CURRENT_EXAM_SESSION = {
        ...c,
        questions: shuffledQuestions,
        type: 'challenge' // Đánh dấu là thử thách
    };
    
    // Đồng bộ vào state cũ để code cũ không lỗi
    state.ui.activeChallenge = window.CURRENT_EXAM_SESSION; 
    
    state.ui.challengeAnswers = {};
    state.ui.challengeQIndex = 0;
    state.ui.challengeMode = 'do';
    
    console.log("🔒 Đã cố định đề thi (Thử thách):", shuffledQuestions);
    
    renderApp();
};
        window.selectChallengeAnswer = (qIdx, ansIdx) => {
            state.ui.challengeAnswers[qIdx] = ansIdx;
            renderApp();
        };

        window.navChallenge = (delta) => {
            state.ui.challengeQIndex += delta;
            renderApp();
